<!-- booking.html -->
<!doctype html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
body{font-family:sans-serif;padding:20px}
input,button{width:100%;padding:12px;margin-bottom:10px}
button{background:#0088cc;color:#fff;border:0}
</style>
</head>
<body>

<h3>Booking</h3>

<input id="trip" placeholder="Trip ID">
<input id="name" placeholder="Customer Name">
<input id="phone" placeholder="Phone">
<input id="seats" placeholder="S01,S02">
<input id="total" placeholder="Total">
<input id="deposit" placeholder="Deposit">

<button onclick="save()">CONFIRM</button>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

function save(){

fetch("https://script.google.com/macros/s/AKfycbzsJGvZWz0PPj30gD3CYZ3VvHCRLMktkvE9w1xhfy6CUTe4BmJw0mP5IKir0K5KyByE/exec",{
method:"POST",
body:JSON.stringify({
action:"book",
tripId:trip.value,
name:name.value,
phone:phone.value,
seats:seats.value.split(",").map(x=>x.trim()),
total:+total.value,
deposit:+deposit.value,
method:"Cash"
})
})
.then(r=>r.json())
.then(x=>{
tg.showAlert("Success");
tg.close();
});

}
</script>

</body>
</html>

<!doctype html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
body{font-family:sans-serif;padding:20px}
input,button{width:100%;padding:12px;margin-bottom:10px}
button{background:#16a34a;color:#fff;border:0}
</style>
</head>
<body>

<h3>Create Trip</h3>

<input id="tripId" placeholder="Trip ID">
<input id="route" placeholder="Route">
<input id="departAt" placeholder="2026-05-10 18:00">
<input id="price" placeholder="Price">
<input id="seats" placeholder="Seats">

<button onclick="save()">CREATE TRIP</button>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

function save(){

fetch("https://script.google.com/macros/s/AKfycbzsJGvZWz0PPj30gD3CYZ3VvHCRLMktkvE9w1xhfy6CUTe4BmJw0mP5IKir0K5KyByE/exec",{
method:"POST",
body:JSON.stringify({
action:"create_trip",
tripId:tripId.value,
route:route.value,
departAt:departAt.value,
price:+price.value,
totalSeats:+seats.value
})
})
.then(r=>r.json())
.then(x=>{
tg.showAlert("Trip Created");
tg.close();
});

}
</script>

</body>
</html>
